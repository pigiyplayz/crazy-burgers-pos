<html lang="en">
<head>

    <style>
        :root {
            --primary: #DC2626; --primary-hover: #b91c1c; --secondary: #f4f6f9; --dark: #0f172a; --dark-light: #1e293b;
            --accent: #3b82f6; --success: #16a34a; --warning: #f59e0b; --text-dark: #0f172a; --text-gray: #64748b;
            --radius-md: 12px; --radius-lg: 20px; --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--secondary); color: var(--text-dark); overflow: hidden; display: flex; height: 100vh; }
        button { cursor: pointer; border: none; font-weight: 800; outline: none; transition: 0.1s; }
        button:active { transform: scale(0.96); opacity: 0.9; }

        .view-container { display: none; width: 100%; height: 100%; flex-direction: column; overflow: hidden; background: #fff;}
        .view-container.active { display: flex; animation: fadeIn 0.1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .sidebar { width: 110px; background-color: var(--dark); display: flex; flex-direction: column; align-items: center; padding: 25px 0; overflow-y: auto; flex-shrink: 0; border-right: 1px solid rgba(255,255,255,0.05); z-index: 50; }
        .sidebar-logo { width: 65px; height: 65px; background: linear-gradient(135deg, var(--primary), #b91c1c); color: white; font-weight: 900; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; border-radius: 16px; margin-bottom: 30px; box-shadow: 0 8px 16px rgba(220, 38, 38, 0.4); }
        .nav-button { width: 90px; height: 80px; margin-bottom: 10px; background: transparent; color: #94a3b8; border-radius: 12px; font-size: 0.7rem; gap: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .nav-button:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-button.active-nav { background: var(--primary); color: white; }
        
        #pos-view { flex-direction: row; }
        .pos-main { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; background: #f8fafc; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
        .menu-card { background: white; border-radius: var(--radius-md); padding: 0; box-shadow: var(--shadow-md); border: 2px solid transparent; display: flex; flex-direction: column; cursor: pointer; overflow: hidden; transition: 0.2s; }
        .menu-card:hover { border-color: var(--primary); }
        .menu-img { width: 100%; height: 140px; background-size: cover; background-position: center; }
        .menu-content { padding: 15px; flex-grow: 1; }
        
        .order-panel { width: 400px; background: white; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; flex-shrink: 0; }
        .op-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-row { display: flex; justify-content: space-between; background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 4px solid var(--primary); align-items: center; }
        .op-footer { padding: 25px; background: #fdfdfd; border-top: 1px solid #f1f5f9; }
        .pay-btn { background: var(--success); color: white; width: 100%; padding: 20px; font-size: 1.3rem; border-radius: 16px; margin-top: 15px; font-weight: 900; }

        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .modal { background: white; width: 100%; max-width: 500px; border-radius: var(--radius-lg); padding: 30px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        
        #station-call-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--warning); color: var(--dark); padding: 18px 35px; border-radius: 99px; font-weight: 900; font-size: 1.1rem; box-shadow: 0 10px 15px rgba(0,0,0,0.2); z-index: 20000; display: none; border: 3px solid white; }

        #receipt-area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #receipt-area, #receipt-area * { visibility: visible; }
            #receipt-area { position: fixed; left: 0; top: 0; display: block; width: 72mm; padding: 2mm; font-family: 'Courier New', Courier, monospace; text-align: center; }
            .sep { border-bottom: 1px dashed #000; margin: 3mm 0; }
            .item { display: flex; justify-content: space-between; margin: 2mm 0; font-size: 10pt; }
        }

        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .pin-dot-area { font-size: 2.5rem; height: 80px; background: #f8fafc; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-weight: 900; margin-bottom: 20px; border: 2px solid #e2e8f0; }
        
        .architect-container { display: flex; height: 600px; gap: 20px; background: #f1f5f9; border-radius: 20px; padding: 20px; border: 2px solid #e2e8f0; }
        .toolbox { width: 220px; background: white; border-radius: 12px; padding: 15px; overflow-y: auto; }
        .toolbox-item { padding: 12px; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 10px; margin-bottom: 10px; font-size: 0.8rem; font-weight: 700; cursor: grab; display: flex; align-items: center; gap: 8px; }
        .workspace { flex: 1; background: white; border-radius: 12px; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; overflow-x: hidden; position: relative; }
        .receipt-canvas { width: 72mm; min-height: fit-content; border: 2px solid var(--dark); background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 10px; margin-bottom: 100px; }
        .canvas-row { position: relative; padding: 10px; border: 1px solid #f1f5f9; min-height: 20px; width: 100%; border-radius: 6px; margin-bottom: 4px; display: flex; flex-direction: column; align-items: center; }
        .canvas-row:hover { border: 1px dashed var(--accent); background: #f0f7ff; }
        .row-ctrls { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); display: flex; gap: 4px; visibility: hidden; }
        .canvas-row:hover .row-ctrls { visibility: visible; }
        .ctrl-btn { width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; background: #fff; border: 1px solid #eee; }
        .ctrl-btn.rem { background: #ef4444; color: white; border: none; }
        
        .master-tab { border-radius: 10px; cursor: pointer; padding: 12px; font-weight: 800; border: none; background: transparent; color: var(--text-gray); }
        .master-tab.active { background: #f1f5f9; color: var(--primary); }
        .master-content { display: none; }
        .master-content.active { display: block; }

        .jukebox-card { background: white; border-radius: 15px; padding: 25px; box-shadow: var(--shadow-md); border: 2px solid #e2e8f0; }
        .now-playing-box { display: flex; gap: 25px; align-items: center; margin-bottom: 30px; }
        .album-art { width: 150px; height: 150px; border-radius: 15px; background: var(--dark-light); background-size: cover; background-position: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); flex-shrink: 0; }
        .song-info { flex: 1; text-align: left; }
        .song-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .song-artist { font-size: 1.1rem; color: var(--text-gray); font-weight: 600; margin-bottom: 15px; }
        
        .prog-wrap { width: 100%; height: 6px; background: rgba(0,0,0,0.1); border-radius: 10px; margin-bottom: 25px; position: relative; }
        .prog-bar { height: 100%; background: var(--accent); border-radius: 10px; transition: 0.1s; width: 0%; }
        .audio-ctrls { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .ctrl-icon { width: 45px; height: 45px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--dark); cursor: pointer; transition: 0.2s; }
        .ctrl-icon:hover { background: var(--accent); color: white; transform: scale(1.1); }
        .ctrl-icon.play-main { width: 65px; height: 65px; background: var(--dark); color: white; }
        .vol-wrap { display: flex; align-items: center; gap: 10px; margin-top: 25px; }
        input[type=range] { flex: 1; accent-color: var(--accent); }
    </style>
</head>
<body>

    <div id="station-call-alert">⚠️ ALERT: <span id="call-msg"></span> <button onclick="clearCall()" style="margin-left: 15px; padding: 8px 20px; border-radius: 30px; background: rgba(0,0,0,0.1); font-weight:900;">CLEAR</button></div>

    <div id="overlay-alert" class="overlay"><div class="modal" style="text-align:center;"><div id="alert-title" style="font-size:1.8rem; font-weight:900; margin-bottom:15px;">Notice</div><p id="alert-body" style="font-size:1.2rem; color:var(--text-gray); margin-bottom: 25px;"></p></div></div>
    
    <div id="overlay-loyalty" class="overlay">
        <div class="modal">
            <h2 style="text-align:center; margin-bottom:25px; font-weight:900;">Customer Rewards</h2>
            <div id="loyalty-init" style="display:grid; grid-template-columns: 1fr; gap:10px;">
                <button class="pay-btn" onclick="loyS('search')">Find Member Account</button>
                <button class="pay-btn" style="background:var(--success);" onclick="loyS('create')">Register New Member</button>
                <button class="pay-btn" style="background:#f1f5f9; color:var(--dark);" onclick="skipLoyalty()">No Rewards (Skip)</button>
            </div>
            <div id="loyalty-find" style="display:none;"><input type="text" id="loy-q" placeholder="Customer Name"><button class="pay-btn" onclick="findMember()">Lookup Account</button><button class="pay-btn" style="background:none; color:gray;" onclick="loyS('init')">Cancel</button></div>
            <div id="loyalty-create" style="display:none;"><input type="text" id="loy-n" placeholder="Customer Name"><button class="pay-btn" onclick="createMember()">Create Account</button><button class="pay-btn" style="background:none; color:gray;" onclick="loyS('init')">Cancel</button></div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <nav class="sidebar">
        <div class="sidebar-logo">CB</div>
        <button class="nav-button active-nav" onclick="navTo('pos-view', this)"><i data-lucide="layout-grid"></i> POS</button>
        <button class="nav-button" onclick="navTo('kiosk-view', this)"><i data-lucide="smartphone"></i> Kiosk</button>
        <button class="nav-button" onclick="navTo('cust-view', this)"><i data-lucide="monitor"></i> CDS</button>
        <button class="nav-button" onclick="navTo('kds-view', this)"><i data-lucide="chef-hat"></i> KDS</button>
        <button class="nav-button" onclick="reqAuth('manager-view', this)"><i data-lucide="bar-chart-3"></i> Master</button>
        <button class="nav-button" onclick="reqAuth('staff-view', this)"><i data-lucide="user-check"></i> Staff</button>
        <button class="nav-button" onclick="navTo('calls-view', this)"><i data-lucide="bell"></i> Alerts</button>
    </nav>

    <!-- VIEWS -->
    <main id="pos-view" class="view-container active">
        <div class="pos-main"><h1 style="font-weight:900; margin-bottom:20px;">POS Terminal</h1><div class="menu-grid" id="pos-grid"></div></div>
        <aside class="order-panel">
            <div class="op-items" id="op-items"></div>
            <div class="op-footer">
                <div id="cart-loyalty-info" style="background:#f0faf2; padding:12px; border-radius:12px; margin-bottom:10px; display:none;">VIP: <span id="member-tag" style="font-weight:900;"></span></div>
                <div style="display:flex; justify-content:space-between; font-weight:900; font-size:1.6rem;"><span>Total</span> $<span id="pos-total">0.00</span></div>
                <button class="pay-btn" onclick="startCheckout()">Checkout</button>

            <h2>Kitchen Board</h2>
            <button onclick="enableVoice()" id="voice-lock" style="background:var(--accent); color:white; padding:10px 20px; border-radius:12px;">Enable Kitchen Audio</button>
        </div>
        <div style="padding:20px; flex:1; overflow-y:auto;"><div class="menu-grid" id="kds-grid"></div></div>

    <main id="manager-view" class="view-container">
        <div style="padding:30px; max-width:1100px; margin:auto; width:100%;">
            <div style="display:flex; background:#e2e8f0; padding:6px; border-radius:14px; margin-bottom:25px;">
                <button class="master-tab active" onclick="switchM('s-kpi', this)">KPI</button>
                <button class="master-tab" onclick="switchM('s-staff', this)">Staffing</button>
                <button class="master-tab" onclick="switchM('s-config', this)">Architect</button>
                <button class="master-tab" onclick="switchM('s-jukebox', this)">Jukebox</button>
            </div>
            <div id="s-jukebox" class="master-content">
                <div class="jukebox-card">
                    <h2 style="font-weight:900; margin-bottom:20px;">Master Cloud Jukebox</h2>
                    <div style="background:#f8fafc; padding:20px; border-radius:15px; border:2px dashed #cbd5e1; text-align:center; margin-bottom:25px;">
                        <input type="file" id="j-file" accept="audio/*" style="display:none;" onchange="uploadMusic(this.files[0])">
                        <button class="pay-btn" style="margin:0; width:auto; padding:12px 40px;" onclick="document.getElementById('j-file').click()"><i data-lucide="upload-cloud"></i> Upload MP3</button>
                        <p id="upload-status" style="margin-top:10px; font-size:0.85rem; color:var(--text-gray);"></p>
                    </div>
                    <div id="m-jukebox-list"></div>
                    <div style="display:flex; gap:10px; margin-top:25px;"><button class="pay-btn" style="margin:0;" onclick="jAction('toggle', { play: !jState.playing })">${jState.playing?'Pause':'Play All'}</button><button class="pay-btn" style="background:gray; margin:0;" onclick="jAction('clear')">Clear All</button></div>
                </div>
            </div>
            <div id="s-config" class="master-content">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><p style="font-weight:700;">Design your receipt below.</p><button class="pay-btn" style="margin:0; width:auto; padding:10px 30px;" onclick="saveArchitect()">Save Layout</button></div>
                <div class="architect-container" style="height: calc(100vh - 280px);">
                    <div class="toolbox">
                        <div class="toolbox-item" draggable="true" ondragstart="drag(event, 'logo')"><i data-lucide="image"></i> Logo</div>
                        <div class="toolbox-item" draggable="true" ondragstart="drag(event, 'text')"><i data-lucide="type"></i> Header</div>
                        <div class="toolbox-item" draggable="true" ondragstart="drag(event, 'orderid')"><i data-lucide="hash"></i> Order #</div>
                        <div class="toolbox-item" draggable="true" ondragstart="drag(event, 'sep')"><i data-lucide="minus"></i> Separator</div>
                    </div>

    <main id="cust-view" class="view-container" style="background:var(--dark); color:white;">
        <div id="cds-setup" style="text-align:center; margin-top:20vh;"><button class="pay-btn" onclick="bindC('Front Counter')">Activate Display</button></div>
        <div id="cds-active" style="display:none; padding:40px; text-align:center;">
            <div id="cds-order-view" style="margin-bottom:60px;">
                <h1 id="cds-status" style="font-size:5rem; font-weight:900;">WELCOME</h1>
                <div id="cds-items" style="font-size:2rem; opacity:0.7;">Ready to serve.</div>
            </div>
            <div class="jukebox-card" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:white; max-width:650px; margin:auto;">
                <div class="now-playing-box">
                    <div class="album-art" id="c-art"></div>
                    <div class="song-info">
                        <div class="song-title" id="c-title">No Track Playing</div>
                        <div class="song-artist" id="c-artist">-</div>
                        <div class="prog-wrap"><div class="prog-bar" id="c-prog" style="width:0%"></div></div>
                        <div class="audio-ctrls">
                            <div class="ctrl-icon" onclick="jAction('skip', { type: 'prev' })"><i data-lucide="skip-back"></i></div>
                            <div class="ctrl-icon play-main" onclick="jAction('toggle', { play: !jState.playing })" id="c-toggle-btn"><i data-lucide="play"></i></div>
                            <div class="ctrl-icon" onclick="jAction('skip', { type: 'next' })"><i data-lucide="skip-forward"></i></div>
                        </div>
                        <div class="vol-wrap"><i data-lucide="volume-2"></i><input type="range" id="c-vol" min="0" max="100" value="50" oninput="jAction('volume', { val: this.value })"></div>
                    </div>
                </div>
            </div>
            <audio id="global-player" onended="onTrackEnd()" ontimeupdate="onSeekChange()"></audio>
            <button onclick="resetC()" style="margin-top:50px; background:none; color:gray;">Unbind Device</button>
        </div>
    </main>

    <audio id="kds-ding-audio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        lucide.createIcons();
        const fC = { apiKey: "AIzaSyCDCnCn53HqVdIyTe-OcoITQ6mIuVn-eg4", authDomain: "crazy-burgers-fa20a.firebaseapp.com", projectId: "crazy-burgers-fa20a", storageBucket: "crazy-burgers-fa20a.appspot.com", messagingSenderId: "908213507838", appId: "1:908213507838:web:0f719ff0398ffa0b3e37af", measurementId: "G-DDZZ1TR47D" };
        firebase.initializeApp(fC); const db = firebase.firestore(); const storage = firebase.storage(); const socket = io();

        let menu = [{ id: 1, name: "Crazy Burger", price: 8.99, image: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format" }];
        let localStaff = JSON.parse(localStorage.getItem('b44_staff')) || [];
        let rSchema = JSON.parse(localStorage.getItem('b44_rSchema')) || [{ type: 'logo', val: '' }, { type: 'text', val: 'CRAZY BURGERS' }];
        let cart = []; let activeOrders = []; let curM = null; let discAmt = 0; let ptsToRedeem = 0; let sData = null; let sPIN = ""; let authTarget = null; let authBtn = null; let cID = null;
        let voiceActive = JSON.parse(localStorage.getItem('b44_voice')) || false;
        let jState = { playlist: [], currentIndex: -1, locked: false, playing: false, volume: 50, position: 0 };
        let navID = 'pos-view';

        function navTo(id, btn) { navID=id; document.querySelectorAll('.view-container').forEach(c => c.classList.remove('active')); document.getElementById(id).classList.add('active'); if(btn) { document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active-nav')); btn.classList.add('active-nav'); } if(id === 'pos-view') renderP(); if(id === 'manager-view') renderArchitect(); }
        function reqAuth(t, b) { authTarget = t; authBtn = b; sPIN = ""; document.getElementById('pin-overlay').style.display = 'flex'; }
        function pinP(n) { if(sPIN.length < 4) { sPIN += n; document.getElementById('pin-dot-view').innerText = "•".repeat(sPIN.length); } }
        function pinC() { sPIN = ""; document.getElementById('pin-dot-view').innerText = ""; }
        function closePin() { document.getElementById('pin-overlay').style.display = 'none'; }
        function pinV() { if(authTarget === 'manager-view' && sPIN === "2018") { closePin(); navTo(authTarget, authBtn); } else { let m = localStaff.find(e => e.pin === String(sPIN)); if(m) { sData = m; closePin(); navTo(authTarget, authBtn); } else { customAlert("Security", "Invalid PIN"); pinC(); } } }

        // --- [ JUKEBOX ENGINE ] ---
        async function uploadMusic(file) {
            if(!file) return; document.getElementById('upload-status').innerText = "Reading tags...";
            jsmediatags.read(file, {
                onSuccess: async (tag) => {
                    let art = ''; if(tag.tags.picture) { let { data, format } = tag.tags.picture; let base64 = data.map(b => String.fromCharCode(b)).join(''); art = `data:${format};base64,${btoa(base64)}`; }
                    document.getElementById('upload-status').innerText = "Uploading to cloud...";
                    let ref = storage.ref(`music/${Date.now()}_${file.name}`);
                    await ref.put(file); let url = await ref.getDownloadURL();
                    jAction('add', { url, title: tag.tags.title || file.name, artist: tag.tags.artist || 'Unknown', image: art, from: 'Manager' });
                    document.getElementById('upload-status').innerText = "Upload Complete!";
                },
                onError: (e) => { alert("Tag Error: " + e.message); }
            });
        }
        function jAction(type, data = {}) { socket.emit('jukebox-action', { type, ...data }); }
        function onTrackEnd() { jAction('skip', { next: true }); }
        function onSeekChange() { let p = document.getElementById('global-player'); if(p && navID === 'cust-view') { document.getElementById('c-prog').style.width = (p.currentTime/p.duration*100) + '%'; } }

        socket.on('jukebox-update', d => {
            jState = d; let track = d.playlist[d.currentIndex];
            if(track) {
                document.getElementById('c-title').innerText = track.title; document.getElementById('c-artist').innerText = track.artist;
                document.getElementById('c-art').style.backgroundImage = `url('${track.image || 'https://via.placeholder.com/150'}')`;
                let p = document.getElementById('global-player');
                if(p.src !== track.url) { p.src = track.url; if(d.playing) p.play(); }
                p.volume = d.volume / 100; if(d.playing) p.play(); else p.pause();
                document.getElementById('c-toggle-btn').innerHTML = `<i data-lucide="${d.playing?'pause':'play'}"></i>`;
                document.getElementById('c-vol').value = d.volume; lucide.createIcons();
            }
            let mList = document.getElementById('m-jukebox-list');
            if(mList) mList.innerHTML = d.playlist.map((t,i)=>`<div class="track-item ${i===d.currentIndex?'now':''}"><span>${t.title}</span><button onclick="jAction('skip',{index:${i}})" style="background:none;"><i data-lucide="play"></i></button></div>`).join('');
            lucide.createIcons();
        });

        socket.on('kds-ding', () => { if(navID === 'kds-view') document.getElementById('kds-ding-audio').play().catch(()=>{}); });
        function enableVoice() { voiceActive = true; localStorage.setItem('b44_voice', true); document.getElementById('voice-lock').style.display='none'; }
        function say(msg) { if(voiceActive) { let u = new SpeechSynthesisUtterance(msg); window.speechSynthesis.speak(u); } }

        // --- [ ARCHITECT ] ---
        function renderArchitect() {
            let c = document.getElementById('canvas'); if(!c) return;
            c.innerHTML = rSchema.map((item, idx) => `<div class="canvas-row">${renderComponent(item.type, item.val, idx)}<div class="row-ctrls"><button class="ctrl-btn" onclick="move(${idx},-1)">↑</button><button class="ctrl-btn" onclick="move(${idx},1)">↓</button><button class="ctrl-btn rem" onclick="removeRow(${idx})">×</button></div></div>`).join('');
        }
        function move(idx, dir) { let to = idx+dir; if(to>=0 && to<rSchema.length) { [rSchema[idx], rSchema[to]] = [rSchema[to], rSchema[idx]]; renderArchitect(); } }
        function renderComponent(type, val, idx) { switch(type) {
            case 'logo': return `<img src="${val || 'https://via.placeholder.com/150x50'}" style="max-width:100%;" onclick="editVal(this,'logo',${idx})">`;
            case 'text': return `<input class="row-text" value="${val}" onchange="updateVal(${idx},this.value)">`;
            case 'orderid': return `<p>ORDER #8888</p>`;
            case 'sep': return `<div class="sep" style="border-bottom:1px dashed #000; width:100%; margin:5px 0;"></div>`;
            default: return '';
        }}
        function drag(ev, t) { ev.dataTransfer.setData("type", t); } function allowDrop(ev) { ev.preventDefault(); }
        function drop(ev) { ev.preventDefault(); let t = ev.dataTransfer.getData("type"); rSchema.push({ type: t, val: t === 'text' ? 'New Header' : '' }); renderArchitect(); }
        function removeRow(idx) { rSchema.splice(idx, 1); renderArchitect(); } function updateVal(idx, v) { rSchema[idx].val = v; }
        function saveArchitect() { localStorage.setItem('b44_rSchema', JSON.stringify(rSchema)); customAlert("Saved", "Layout Updated."); }

        // --- [ SYSTEM ] ---
        function startCheckout() { if(cart.length) { loyS('init'); document.getElementById('overlay-loyalty').style.display='flex'; } }
        function loyS(s) { document.getElementById('loyalty-init').style.display=s==='init'?'grid':'none'; document.getElementById('loyalty-find').style.display=s==='search'?'block':'none'; document.getElementById('loyalty-create').style.display=s==='create'?'block':'none'; }
        function skipLoyalty() { curM=null; document.getElementById('overlay-loyalty').style.display='none'; openTableSelect(); }
        function openTableSelect() { document.getElementById('overlay-table').style.display='flex'; if(curM) document.getElementById('member-tag').innerText = curM.name; }
        function finishOrder(tbl) {
            let o = { id: Math.floor(Math.random()*9000), table: tbl, items: [...cart], total: cart.reduce((a,b)=>a+b.price,0), status: 'preparing', time: new Date().toLocaleTimeString(), customer: curM ? curM.name : '' };
            socket.emit('new-order', o); cart=[]; curM=null; renderCart(); document.getElementById('overlay-table').style.display='none';
        }
        function cyc(id, s, silent = false) { 
            socket.emit('update-order-status', { id: Number(id), status: s }); 
            if(!silent && s === 'ready') { let o = activeOrders.find(x => x.id === id); if(o) { if(o.table === 'Takeout') say(`Order ready for pickup ${o.customer?'for '+o.customer:''}.`); else say(`Order for ${o.table} is now ready.`); } }
        }
        function customAlert(t, m) { document.getElementById('alert-title').innerText=t; document.getElementById('alert-body').innerText=m; document.getElementById('overlay-alert').style.display='flex'; setTimeout(()=>document.getElementById('overlay-alert').style.display='none', 4000); }
        function renderP() { document.getElementById('pos-grid').innerHTML = menu.map(m => `<div class="menu-card" onclick="openMod(${m.id})"><div class="menu-img" style="background-image:url('${m.image}')"></div><div class="menu-content"><b>${m.name}</b><br><span style="color:var(--primary)">$${m.price.toFixed(2)}</span></div></div>`).join(''); }
        function openMod(id) { let tI = menu.find(i=>i.id===id); cart.push({ cid: Date.now(), ...tI }); renderCart(); }
        function renderCart() { document.getElementById('op-items').innerHTML = cart.map(i => `<div class="cart-row"><span>${i.name}</span><button onclick="remC(${i.cid})" style="color:red; background:none;">×</button></div>`).join(''); document.getElementById('pos-total').innerText = cart.reduce((a,b)=>a+b.price,0).toFixed(2); }
        function remC(id) { cart = cart.filter(i=>i.cid!==id); renderCart(); }
        function renderK() { document.getElementById('kds-grid').innerHTML = activeOrders.map(o => `<div style="padding:20px; background:white; border-radius:15px; border-top:8px solid ${o.status==='ready'?'var(--success)':'var(--primary)'};"><div style="font-weight:900;">#${o.id} - ${o.table}</div><hr style="margin:12px 0;">${o.items.map(i=>`<div>• ${i.name}</div>`).join('')}<div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:15px;"><button class="pay-btn" style="margin:0; font-size:0.8rem;" onclick="cyc(${o.id}, 'preparing', true)">Cook</button><button class="pay-btn" style="margin:0; font-size:0.8rem; background:var(--success);" onclick="cyc(${o.id}, 'ready')">Ready</button></div><button class="pay-btn" style="width:100%; margin-top:10px; background:var(--dark); font-size:0.8rem;" onclick="cyc(${o.id}, 'Complete', true)">Clear</button></div>`).join(''); }
        function bindC() { document.getElementById('cds-setup').style.display='none'; document.getElementById('cds-active').style.display='block'; }
        function resetC() { document.getElementById('cds-setup').style.display='block'; document.getElementById('cds-active').style.display='none'; }
        function switchM(id, b) { document.querySelectorAll('.master-tab').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.master-content').forEach(x=>x.classList.remove('active')); b.classList.add('active'); document.getElementById(id).classList.add('active'); }
        socket.on('initial-data', d => { activeOrders = d.orders; renderK(); });
        socket.on('order-update', o => { activeOrders = o; renderK(); });
        navTo('pos-view');
    </script>
</body>
</html>
